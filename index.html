<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Expression Evaluator</title>
    
    <script src="fpoints.js"></script>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 80vw;
        }
        h2 { margin-top: 0; color: #333; font-size: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #555; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        #result-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #e9ecef;
            border-radius: 6px;
            text-align: center;
            font-family: monospace;
            font-size: 1.2rem;
            word-break: break-all;
            text-align: left;
            white-space: pre-line;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Expression Evaluator</h2>
    
    <div class="input-group" id="main-input">
        <label for="expressionInput">Math Expression</label>
        <input type="text" id="expressionInput" placeholder="e.g., 10 / 3 or PI * 2">
    </div>

    <div class="input-group">
        <label for="terminationMethod">Termination Method</label>
        <select id="terminationMethod" onchange="onChangeTermMethod(this)" style="margin-bottom: 1.5rem;">
            <option value="none">None</option>
            <option value="rounding">Rounding</option>
            <option value="chopping">Chopping</option>
        </select> 

        <div id="terminationInput" style="display: None;">
            <label for="terminationDigit">Termination Digit</label>
            <input type="number" id="terminationDigit" placeholder="1" min="1" max="8" step="1" value="1"></input>
        </div>
    </div>

    <button onclick="calculate()" style="margin-bottom: 1.5rem;">Calculate</button>

    <label for="result-box">Result:</label>
    <div id="result-box"></div>
</div>
    <script>
        function toDisplay(x) {
            return Math.trunc(x * 100000000) / 100000000;
        }


        function onChangeTermMethod(dropdownElement) {
            const method = dropdownElement.value;
            
            if(method === 'none') {
                document.getElementById('terminationInput').style.display = "None";
            } else if(method === 'chopping' || method === 'rounding') {
                document.getElementById('terminationInput').style.display = "block";
            }
        }

        function calculate() {
            var expr = document.getElementById('expressionInput').value;
            var method = document.getElementById('terminationMethod').value;
            var digit = document.getElementById('terminationDigit').valueAsNumber;

            if(expr === '') {
                return;
            }

            var exact = Module.solve_expression(expr);
            
            const results = document.getElementById('result-box');
            results.textContent = 'Exact: ' + exact;

            if(method === 'none') {
                // show only exact
            } else {
                var approx;
            
                if(method == 'chopping') {
                    approx = toDisplay(Module.solve_expression_chop(expr, digit));
                    results.textContent += '\nChopped: ' + approx;
                } else if(method == 'rounding') {
                    approx = toDisplay(Module.solve_expression_round(expr, digit));
                    results.textContent += '\nRound: ' + approx;
                }

                results.textContent += '\n' + Module.get_all_errors(exact, approx);
            }

            // const toBold = {'Exact', 'Chopped', 'Round', 'Absolute Error', 'Relative Error', 'Significant Digits', 'Max Absolute Error'};
            
        }

        Module.onRuntimeInitialized = () => {
            console.log('WASM module initialized...');
            
            const input = document.getElementById("expressionInput");
            input.addEventListener("keypress", function(event) {
              if (event.key === "Enter") {
                event.preventDefault();
                calculate();
              }
            });
        };
    </script>

</body>
</html>
