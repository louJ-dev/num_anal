<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Expression Evaluator</title>
    
    <script src="fpoints.js"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f3f4f6;
            margin: 0;
        }
        .calculator-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        button {
            padding: 12px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #1f2937;
            min-height: 28px;
            word-wrap: break-word;
        }
        .error {
            color: #ef4444 !important;
            font-size: 16px !important;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h2>Math Evaluator</h2>
        <input type="text" id="expressionInput" placeholder="e.g., 2 + 2 * (3^2)">
        <button onclick="calculate()">Calculate</button>
        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            var expr = document.getElementById('expressionInput').value;
                
            if(expr === '') {
                return;
            }

            var exact = Module.solve_expression(expr);
            var approx = Module.get_chop(exact, 5);

            var abs_error = Module.get_absolute_error(exact, approx);
            var rel_error = Module.get_relative_error(exact, approx);
            var sig_digits = Module.get_sig_digits(rel_error);
            var mabs_error = Module.get_max_abs_error(exact, sig_digits);

            console.log(expr + ' => ' + exact);
            console.log('approx     => ' + approx);
            console.log('abs_error  => ' + abs_error);
            console.log('rel_error  => ' + rel_error);
            console.log('sig_digits => ' + sig_digits);
            console.log('mabs_error =>' + mabs_error);
        }



        Module.onRuntimeInitialized = () => {
            console.log('WASM module initialized...');
            
            const input = document.getElementById("expressionInput");

            input.addEventListener("keypress", function(event) {
              if (event.key === "Enter") {
                event.preventDefault();
                calculate();
              }
            });
        };
    </script>

</body>
</html>
